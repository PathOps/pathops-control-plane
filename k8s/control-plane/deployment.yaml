apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:18.3
          command:
            - sh
            - -c
            - until pg_isready -h control-plane-postgres -p 5432; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: control-plane
          image: gborba/pathops-control-plane:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: control-plane
            - secretRef:
                name: control-plane
          readinessProbe:
            httpGet:
              path: /api/actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
