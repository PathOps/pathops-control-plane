apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: control-plane-postgres
  namespace: control-plane
spec:
  serviceName: control-plane-postgres
  replicas: 1
  selector:
    matchLabels:
      app: control-plane-postgres
  template:
    metadata:
      labels:
        app: control-plane-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: control-plane-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          env:
            - name: PGDATA
              value: /var/lib/postgresql/18/docker
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: control-plane-postgres-data