apiVersion: v1
kind: Secret
metadata:
  name: control-plane-postgres-secret
  namespace: control-plane
type: Opaque
stringData:
  POSTGRES_DB: pathops_control_plane
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: control-plane
  namespace: control-plane
type: Opaque
stringData:
  DB_USERNAME: admin
  DB_PASSWORD: change-me
  PATHOPS_VAULT_TOKEN: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: pgadmin-secret
  namespace: control-plane
type: Opaque
stringData:
  PGADMIN_DEFAULT_EMAIL: admin@example.com
  PGADMIN_DEFAULT_PASSWORD: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: control-plane
type: Opaque
stringData:
  RABBITMQ_DEFAULT_USER: pathops
  RABBITMQ_DEFAULT_PASS: CHANGE_ME