spring.application.name=pathops-control-plane
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${DB_CONNECTION_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_SHOW_SQL:false}

# Actuator
management.info.env.enabled=true
management.endpoints.web.exposure.include=health,info
info.git.commit=${GIT_COMMIT:unknown}
info.git.branch=${GIT_BRANCH:unknown}

# Spring Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${PATHOPS_AUTH_JWK_SET_URI}

# PathOps Auth Config
pathops.public.base-url=${PATHOPS_PUBLIC_BASE_URL}
pathops.auth.issuer=${PATHOPS_AUTH_ISSUER}
pathops.auth.client-id=${PATHOPS_AUTH_CLIENT_ID:control-plane-public}

# RabbitMQ
spring.rabbitmq.host=${PATHOPS_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${PATHOPS_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${PATHOPS_RABBITMQ_USERNAME:pathops}
spring.rabbitmq.password=${PATHOPS_RABBITMQ_PASSWORD:pathops}
spring.rabbitmq.virtual-host=${PATHOPS_RABBITMQ_VHOST:/}

# Publisher confirms/returns
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true

# PathOps events
pathops.events.publishing.enabled=${PATHOPS_EVENTS_PUBLISHING_ENABLED:false}
pathops.events.rabbitmq.exchange=${PATHOPS_EVENTS_EXCHANGE:pathops.events}
pathops.events.rabbitmq.projector-queue=${PATHOPS_PROJECTOR_EVENTS_QUEUE:pathops.projector.events}
pathops.events.rabbitmq.tenant-created-routing-key=${PATHOPS_TENANT_CREATED_ROUTING_KEY:tenant.created}
pathops.events.outbox.publisher.fixed-delay-ms=${PATHOPS_OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
pathops.events.outbox.publisher.batch-size=${PATHOPS_OUTBOX_PUBLISHER_BATCH_SIZE:20}
